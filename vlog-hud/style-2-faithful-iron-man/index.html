<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden; background: #000;
        font-family: "Rajdhani", sans-serif;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="hud-faithful-iron-man" data-start="0" data-width="1920" data-height="1080">
      <div class="video-wrap">
        <video
          id="bg-vid"
          data-start="0"
          data-duration="8"
          data-track-index="0"
          data-has-audio="true"
          src="assets/sample-clip.mp4"
          playsinline
        ></video>
      </div>

      <div class="hud-layer">
        <svg class="frame-svg" viewBox="0 0 1920 1080" width="1920" height="1080" aria-hidden="true">
          <g class="frame-corners" stroke="#ff8c00" stroke-width="2.5" fill="none"
             stroke-linecap="round" stroke-linejoin="round"
             style="filter: drop-shadow(0 0 6px rgba(255, 140, 0, 0.7));">
            <polyline points="40,140 40,40 140,40" />
            <polyline points="60,160 60,60 160,60" />
            <line x1="40" y1="40" x2="50" y2="40" stroke-width="3" />

            <polyline points="1880,140 1880,40 1780,40" />
            <polyline points="1860,160 1860,60 1760,60" />
            <line x1="1880" y1="40" x2="1870" y2="40" stroke-width="3" />

            <polyline points="40,940 40,1040 140,1040" />
            <polyline points="60,920 60,1020 160,1020" />

            <polyline points="1880,940 1880,1040 1780,1040" />
            <polyline points="1860,920 1860,1020 1760,1020" />
          </g>

          <g class="reticle-frame" stroke="#ff8c00" stroke-width="2.5" fill="none"
             style="filter: drop-shadow(0 0 6px rgba(255, 140, 0, 0.7));">
            <polyline points="820,500 820,470 870,470" />
            <polyline points="1100,500 1100,470 1050,470" />
            <polyline points="820,580 820,610 870,610" />
            <polyline points="1100,580 1100,610 1050,610" />
            <line x1="958" y1="540" x2="962" y2="540" stroke-width="3" />
            <line x1="960" y1="538" x2="960" y2="542" stroke-width="3" />
            <circle cx="960" cy="540" r="40" stroke="#00ffff" stroke-width="1" stroke-dasharray="4 6" />
          </g>

          <g class="compass-marks" stroke="#ff8c00" stroke-width="2" opacity="0.85"
             style="filter: drop-shadow(0 0 4px rgba(255, 140, 0, 0.6));">
            <line x1="1480" y1="120" x2="1480" y2="135"/>
            <line x1="1520" y1="120" x2="1520" y2="140"/>
            <line x1="1560" y1="120" x2="1560" y2="135"/>
            <line x1="1600" y1="120" x2="1600" y2="140"/>
            <line x1="1640" y1="120" x2="1640" y2="135"/>
            <line x1="1680" y1="120" x2="1680" y2="148" stroke-width="3"/>
            <line x1="1720" y1="120" x2="1720" y2="135"/>
            <line x1="1760" y1="120" x2="1760" y2="140"/>
            <line x1="1800" y1="120" x2="1800" y2="135"/>
            <line x1="1840" y1="120" x2="1840" y2="140"/>
          </g>
        </svg>

        <div class="telemetry tl-tele">
          <div class="tele-row"><span class="lbl">PWR</span><span class="val">87<span class="unit">%</span></span></div>
          <div class="tele-row"><span class="lbl">TEMP</span><span class="val">38<span class="unit">&deg;C</span></span></div>
          <div class="tele-row"><span class="lbl">ALT</span><span class="val">542<span class="unit">M</span></span></div>
        </div>

        <div class="hdg-block">
          <div class="hdg-label">HDG</div>
          <div class="hdg-value">218&deg;</div>
        </div>

        <div class="speed-block">
          <div class="speed-label">SPEED</div>
          <div class="speed-num">65</div>
          <div class="speed-unit">KPH</div>
        </div>

        <div class="jarvis bl-jarvis">
          <div class="jarvis-row"><span class="prompt">JARVIS&gt;</span> ROUTE OPTIMIZED</div>
          <div class="jarvis-row"><span class="prompt">JARVIS&gt;</span> TRAFFIC NOMINAL</div>
          <div class="jarvis-row"><span class="prompt">JARVIS&gt;</span> ETA 14:42 LOCAL</div>
        </div>

        <div class="scan-line"></div>
      </div>

      <style>
        [data-composition-id="hud-faithful-iron-man"] {
          position: relative; width: 1920px; height: 1080px;
          overflow: hidden;
          color: #ff8c00;
          font-family: "Rajdhani", sans-serif;
        }
        [data-composition-id="hud-faithful-iron-man"] .video-wrap {
          position: absolute; inset: 0; z-index: 1;
        }
        [data-composition-id="hud-faithful-iron-man"] .video-wrap video {
          width: 1920px; height: 1080px; object-fit: cover;
        }
        [data-composition-id="hud-faithful-iron-man"] .hud-layer {
          position: absolute; inset: 0; z-index: 2; pointer-events: none;
        }

        [data-composition-id="hud-faithful-iron-man"] .frame-svg {
          position: absolute; inset: 0;
        }

        [data-composition-id="hud-faithful-iron-man"] .telemetry {
          position: absolute; top: 90px; left: 110px;
          background: rgba(0, 0, 0, 0.55);
          border-left: 3px solid #ff8c00;
          padding: 14px 22px;
          font-family: "Orbitron", sans-serif;
          color: #ff8c00;
          text-shadow: 0 0 8px rgba(255, 140, 0, 0.7), 0 1px 0 #000;
          min-width: 220px;
        }
        [data-composition-id="hud-faithful-iron-man"] .tele-row {
          display: flex; justify-content: space-between; align-items: baseline;
          gap: 24px;
          font-size: 26px; line-height: 1.45;
          font-variant-numeric: tabular-nums;
        }
        [data-composition-id="hud-faithful-iron-man"] .tele-row .lbl {
          opacity: 0.75; font-weight: 500; letter-spacing: 1.5px;
        }
        [data-composition-id="hud-faithful-iron-man"] .tele-row .val {
          color: #ffffff; font-weight: 700;
          text-shadow: 0 0 10px rgba(255, 140, 0, 0.95), 0 0 2px #000;
        }
        [data-composition-id="hud-faithful-iron-man"] .tele-row .unit {
          font-size: 18px; color: #ff8c00; opacity: 0.85; margin-left: 2px;
        }

        [data-composition-id="hud-faithful-iron-man"] .hdg-block {
          position: absolute; top: 90px; right: 110px;
          text-align: right;
          font-family: "Orbitron", sans-serif;
          color: #ff8c00;
        }
        [data-composition-id="hud-faithful-iron-man"] .hdg-label {
          font-size: 18px; opacity: 0.8; letter-spacing: 4px;
        }
        [data-composition-id="hud-faithful-iron-man"] .hdg-value {
          font-size: 56px; font-weight: 900; line-height: 1;
          color: #ffffff;
          text-shadow: 0 0 10px rgba(255, 140, 0, 0.9), 0 0 2px #000;
          margin-top: 6px;
        }

        [data-composition-id="hud-faithful-iron-man"] .speed-block {
          position: absolute; bottom: 80px; left: 50%;
          transform: translateX(-50%);
          text-align: center;
          font-family: "Orbitron", sans-serif;
          background: rgba(0, 0, 0, 0.5);
          padding: 14px 36px;
          border-top: 2px solid #ff8c00;
          border-bottom: 2px solid #ff8c00;
        }
        [data-composition-id="hud-faithful-iron-man"] .speed-label {
          font-size: 16px; letter-spacing: 5px; color: #ff8c00; opacity: 0.85;
        }
        [data-composition-id="hud-faithful-iron-man"] .speed-num {
          font-size: 110px; font-weight: 900; line-height: 1;
          color: #ffffff;
          font-variant-numeric: tabular-nums;
          text-shadow: 0 0 14px rgba(255, 140, 0, 0.95), 0 0 3px #000;
        }
        [data-composition-id="hud-faithful-iron-man"] .speed-unit {
          font-size: 22px; letter-spacing: 6px; color: #00ffff;
          text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
          margin-top: 2px;
        }

        [data-composition-id="hud-faithful-iron-man"] .jarvis.bl-jarvis {
          position: absolute; bottom: 90px; left: 110px;
          font-family: "Rajdhani", sans-serif;
          font-size: 24px; line-height: 1.5;
          background: rgba(0, 0, 0, 0.55);
          padding: 14px 20px;
          border-left: 3px solid #ff8c00;
          color: #ff8c00;
          text-shadow: 0 0 6px rgba(255, 140, 0, 0.6), 0 1px 0 #000;
        }
        [data-composition-id="hud-faithful-iron-man"] .jarvis-row {
          font-weight: 600; letter-spacing: 1px;
        }
        [data-composition-id="hud-faithful-iron-man"] .jarvis-row .prompt {
          color: #00ffff; margin-right: 8px;
          text-shadow: 0 0 6px rgba(0, 255, 255, 0.7), 0 1px 0 #000;
        }

        [data-composition-id="hud-faithful-iron-man"] .scan-line {
          position: absolute; left: 0; right: 0; top: 0;
          height: 110px; transform: translateY(-110px);
          background: linear-gradient(180deg,
            rgba(255, 140, 0, 0) 0%,
            rgba(255, 140, 0, 0.16) 45%,
            rgba(255, 140, 0, 0.28) 50%,
            rgba(255, 140, 0, 0.16) 55%,
            rgba(255, 140, 0, 0) 100%);
          mix-blend-mode: screen;
          will-change: transform;
        }
      </style>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(".frame-corners > *", { opacity: 0, scale: 0.7, transformOrigin: "center", duration: 0.5, ease: "expo.out", stagger: 0.04 }, 0.15);
        tl.from(".reticle-frame", { opacity: 0, scale: 0.7, transformOrigin: "960px 540px", duration: 0.6, ease: "expo.out" }, 0.3);
        tl.from(".compass-marks line", { opacity: 0, y: -10, duration: 0.4, ease: "power2.out", stagger: 0.04 }, 0.5);
        tl.from(".tl-tele",     { x: -40, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.4);
        tl.from(".hdg-block",   { x:  40, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.5);
        tl.fromTo(".speed-block",
          { xPercent: -50, y: 40, opacity: 0 },
          { xPercent: -50, y: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
          0.6);
        tl.from(".jarvis-row",  { x: -20, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.18 }, 1.0);

        // Reticle breathing: 7 yoyo cycles, ends at 7.9s
        tl.to(".reticle-frame", { scale: 1.05, transformOrigin: "960px 540px", duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 13 }, 0.9);

        // Compass crosshair (the bold center mark) blink
        tl.to(".compass-marks line:nth-child(6)", { opacity: 0.4, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 9 }, 1.0);

        // Aggressive scan: 4 sweeps period 1.7s starting at 0.5s
        tl.fromTo(".scan-line",
          { y: -110 },
          { y: 1080, duration: 1.0, ease: "power2.in", repeat: 3, repeatDelay: 0.7 },
          0.5);

        window.__timelines["hud-faithful-iron-man"] = tl;
      </script>
    </div>
  </body>
</html>
